name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r BitMemo-${{ github.ref_name }}.zip manifest.json popup.html css/ js/ assets/ README.md CHANGELOG.md

      - name: Extract latest changelog
        run: |
          python3 -c "import sys; content = open('CHANGELOG.md').read(); print(content.split('## [')[1].split('\n', 1)[1].strip())" > release_notes.md

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: BitMemo-${{ github.ref_name }}.zip
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
